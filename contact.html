<!DOCTYPE html>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Contact the Read-Aloud team for support or feedback.">
  <link rel="stylesheet" href="/styles.css">
  <script src="/cookie-consent.js" defer></script>
</head>

<body>
<header class="site-header">
  <div class="nav-container">
    <a class="logo" href="/index.html">Read‑Aloud</a>
    <nav class="site-nav" aria-label="Primary">
      <a href="/index.html">Home</a>
      <a href="/guides.html">Guides</a>
      <a href="/help.html">Help</a>
      <a href="/blog/">Blog</a>
      <a href="/recommendations.html">Resources</a>
    </nav>
  </div>
</header>

<main>
  <header class="page-head">
    <p class="eyebrow"><span>Read‑Aloud</span><span class="sep">·</span><span>Contact</span></p>
    <h1>Send <em>a note.</em></h1>
    <p class="lead">
      Feedback, feature requests, or bug reports — all welcome. Use the form below or email <a href="mailto:admin@read-aloud.com">admin@read-aloud.com</a>. Replies usually within a few days.
    </p>
  </header>

  <article class="content">
    <form action="https://formspree.io/f/xpqjrpvp" method="POST">
      <label for="name">Name</label>
      <input required id="name" name="name" type="text">

      <label for="email">Email</label>
      <input required id="email" name="_replyto" type="email">

      <label for="msg">Message</label>
      <textarea required id="msg" name="message" rows="6"></textarea>

      <!-- honeypot: humans don't fill this; bots do. Formspree drops the submission. -->
      <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off" aria-hidden="true">

      <button type="submit">Send message</button>
    </form>
  </article>
</main>

<footer class="site-footer">
  <div class="footer-container">
    <span>© 2026 Read‑Aloud</span> · <a href="/about.html">About</a> · <a href="/contact.html">Contact</a> · <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a>
  </div>
</footer>
</body>
</html>
